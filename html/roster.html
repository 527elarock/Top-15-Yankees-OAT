    <link
      href="https://fonts.googleapis.com/css?family=Martel+Sans:400,900"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/normalize.css">

  <body>
    <div class="outer-wrapper">
      <nav class="top-nav">

    <div class="nav-left">

        <img src="../img/yanks.jpg" alt="Yankees Logo" class="nav-logo">

      <!-- PLAYER CARD GALLERY -->
<div class="gallery" id="player-gallery"></div>

<!-- PLAYER MODAL -->

<div id="player-modal" class="modal">

  <div class="modal-content">

    <span class="close-btn" onclick="closeModal()">&times;</span>

    <img id="info-pic" src="../img/yanks.jpg" alt="Player Image">

    <h2 id="info-name">Player Name</h2>

    <p><strong>Position:</strong> <span id="info-position"></span></p>

    <p><strong>World Series Wins:</strong> <span id="info-wins"></span></p>

    <p><strong>All-Star Selections:</strong> <span id="info-selections"></span></p>

    <p><strong>Best Stat 1:</strong> <span id="info-bs1"></span></p>

    <p><strong>Best Stat 2:</strong> <span id="info-bs2"></span></p>

    <p><strong>Best Stat 3:</strong> <span id="info-bs3"></span></p>

    <p><strong>Hometown:</strong> <span id="info-hometown"></span></p>

    <p><strong>Nickname:</strong> <span id="info-nickname"></span></p>

  </div>

</div>
  </body>

<script src="../js/player-data.js"></script>
